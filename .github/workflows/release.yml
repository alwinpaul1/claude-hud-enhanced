name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm
          cache-dependency-path: plugins/claude-hud-enhanced/package-lock.json
      - name: Install, build, and test
        working-directory: plugins/claude-hud-enhanced
        run: |
          npm ci
          npm run build
          npm test
          npm run test:coverage
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
