name: Build dist

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'plugins/claude-hud-enhanced/src/**'
      - 'plugins/claude-hud-enhanced/package.json'
      - 'plugins/claude-hud-enhanced/package-lock.json'
      - 'plugins/claude-hud-enhanced/tsconfig.json'

concurrency:
  group: build-dist
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[auto]')"

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: plugins/claude-hud-enhanced/package-lock.json

      - name: Install and build
        working-directory: plugins/claude-hud-enhanced
        run: |
          npm ci
          npm run build

      - name: Verify build output
        run: test -f plugins/claude-hud-enhanced/dist/index.js || exit 1

      - name: Commit dist/ if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add plugins/claude-hud-enhanced/dist/ --force
          git diff --staged --quiet || git commit -m "build: compile dist/ [auto]"
          git push
