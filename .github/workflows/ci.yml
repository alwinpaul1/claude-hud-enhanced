name: CI

on:
  pull_request:
  push:
    branches: [main]
    paths:
      - 'plugins/claude-hud-enhanced/src/**'
      - 'plugins/claude-hud-enhanced/tests/**'
      - 'plugins/claude-hud-enhanced/package.json'
      - 'plugins/claude-hud-enhanced/package-lock.json'
      - 'plugins/claude-hud-enhanced/tsconfig.json'

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x, 20.x]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: plugins/claude-hud-enhanced/package-lock.json
      - name: Install and test
        working-directory: plugins/claude-hud-enhanced
        run: |
          npm ci
          npm run test:coverage
